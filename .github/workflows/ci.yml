cat > .github/workflows/ci.yml << 'EOF'
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov httpx

      - name: Lint with flake8
        run: |
          flake8 main.py --max-line-length=120 --ignore=E501,W503,W292,E302,E303,W291

      - name: Run tests with coverage
        run: |
          pytest test_main.py --cov=main --cov-report=term-missing --cov-fail-under=80
EOF